spring.application.name=tpejemplo

# Base de datos H2 en memoria
#spring.datasource.url=jdbc:h2:mem:tpdb
spring.datasource.url=jdbc:mysql://localhost:3306/tpejemplo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.driver-class-name=org.h2.Driver
