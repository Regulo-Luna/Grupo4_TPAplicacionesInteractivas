spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# JPA / Hibernate



# Consola H2 (solo desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Puerto
server.port=8080

